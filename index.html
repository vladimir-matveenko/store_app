<!DOCTYPE html>
<html>
<head>

    <base href="/store_app/">

    <meta charset="UTF-8">
    <meta content="IE=Edge" http-equiv="X-UA-Compatible">
    <meta name="description" content="A new Flutter project.">

    <!-- iOS meta tags & icons -->
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black">
    <meta name="apple-mobile-web-app-title" content="store_app">
    <link rel="apple-touch-icon" href="icons/Icon-192.png">

    <!-- Favicon -->
    <link rel="icon" type="image/png" href="favicon.png"/>

    <title>store_app</title>
    <style>
        html,
        body {
            width: 100%;
            height: 100%;
            margin: 0;
            padding: 0;
            overflow: hidden;
            background: #121212;
        }

        #loading {
            position: fixed;
            inset: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #121212;
            z-index: 9999;
            transition: opacity .3s ease;
        }

        #loading.fade-out {
            opacity: 0;
            pointer-events: none;
        }

        #loading svg {
            width: 220px;
            height: 80px;
        }

        .dot {
            animation: bounce 1.2s ease-in-out infinite;
            transform-origin: center;
        }

        .dot:nth-child(1) {
            animation-delay: 0s;
        }

        .dot:nth-child(2) {
            animation-delay: 0.15s;
        }

        .dot:nth-child(3) {
            animation-delay: 0.3s;
        }

        .dot:nth-child(4) {
            animation-delay: 0.45s;
        }

        .dot:nth-child(5) {
            animation-delay: 0.6s;
        }

        @keyframes bounce {
            0%, 100% {
                transform: translateY(0);
                opacity: 0.35;
            }

            50% {
                transform: translateY(-18px);
                opacity: 1;
            }
        }
    </style>
    <link rel="manifest" href="manifest.json">
</head>
<body>

<div id="loading">
    <svg viewBox="0 0 220 80"
         xmlns="http://www.w3.org/2000/svg"
         fill="#FFFFFF">

        <circle class="dot" cx="38" cy="40" r="10"/>
        <circle class="dot" cx="74" cy="40" r="10"/>
        <circle class="dot" cx="110" cy="40" r="10"/>
        <circle class="dot" cx="146" cy="40" r="10"/>
        <circle class="dot" cx="182" cy="40" r="10"/>

    </svg>
</div>

<script>
    window.addEventListener('flutter-first-frame', function () {
        const loader = document.getElementById('loading');

        if (!loader) return;

        loader.classList.add('fade-out');

        setTimeout(() => {
            loader.remove();
        }, 300);
    });
</script>

<script src="flutter_bootstrap.js" async></script>
</body>
</html>
